<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>שְוַי שְוַי</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f1eddf;color:#24221e;font-family:Arial,sans-serif}.wrap{width:min(720px,calc(100% - 28px));margin:28px auto}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}.brand{display:flex;gap:12px;align-items:center}.logo{background:#24221e;color:#ffd75a;width:54px;height:54px;border-radius:17px;display:grid;place-items:center;font-size:30px;font-weight:bold}h1{margin:0;font-size:24px}.sub{margin:4px 0 0;color:#706b62}.reset,.check,.next{border:2px solid #24221e;border-radius:13px;padding:12px 18px;font-weight:bold;font-size:16px;cursor:pointer}.reset{background:transparent}.card{background:#fffdf6;border:2px solid #24221e;border-radius:25px;padding:28px;box-shadow:7px 7px 0 #24221e}.status{display:flex;justify-content:space-between;color:#706b62;font-size:14px}.bar{height:8px;border-radius:8px;background:#e6e0d2;margin:10px 0 28px;overflow:hidden}.bar i{display:block;width:10%;height:100%;background:#368b69}.label{font-size:12px;font-weight:bold;color:#706b62;margin:0 0 7px}.word{font-size:50px;margin:0;direction:rtl}.meta{color:#706b62;margin:5px 0 20px}.example{background:#f1eee5;border-radius:17px;padding:16px 18px;margin-bottom:22px}.sentence{font-size:23px;direction:rtl;margin:7px 0 0;line-height:1.7}label{display:block;font-weight:bold;font-size:14px;margin:14px 0}input,textarea{display:block;width:100%;margin-top:7px;border:2px solid #ddd6c5;border-radius:13px;padding:13px;font:16px Arial;resize:vertical}.check,.next{width:100%;background:#ffd75a;box-shadow:3px 3px 0 #24221e}.feedback{border-top:2px dashed #ddd6c5;margin-top:24px;padding-top:22px}.feedback[hidden]{display:none}.badge{font-weight:bold;margin-bottom:15px}.cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}.box{border:1px solid #ddd6c5;border-radius:13px;padding:12px}.box h3{font-size:12px;color:#706b62;margin:0 0 7px}.box p{margin:0;line-height:1.55;white-space:pre-line}.explain{margin:12px 0}.good{color:#287b5a}.bad{color:#c34e40}.navigation{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:22px}.nav-button{border:2px solid #24221e;border-radius:13px;padding:11px 14px;background:#fffdf6;font-weight:bold;font-size:15px;cursor:pointer}.nav-button:last-child{background:#ffd75a}.nav-button:disabled{opacity:.35;cursor:not-allowed}@media(max-width:560px){.wrap{margin-top:15px}.card{padding:20px;box-shadow:5px 5px 0 #24221e}.sub{display:none}.cols{grid-template-columns:1fr}.word{font-size:43px}}
</style><style>[hidden]{display:none!important}.icon-button{width:46px;height:46px;padding:0;border:2px solid #24221e;border-radius:13px;background:transparent;cursor:pointer;font-size:21px}.icon-button.on{background:#24221e;color:#ffd75a}.top-actions{display:flex;gap:8px}.status-links{display:flex;gap:8px}.status-link{border:0;background:transparent;padding:3px 5px;cursor:pointer;font:700 14px Arial;color:#706b62;text-decoration:underline;text-underline-offset:3px}.list-page[hidden],#quizPage[hidden]{display:none}.list-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.word-list{display:grid;gap:10px}.word-row{display:flex;justify-content:space-between;align-items:flex-start;padding:14px 16px;border:1px solid #ddd6c5;border-radius:14px;background:#fff}.word-row .arabic-small{font-size:24px;direction:rtl}.word-line{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}.translit{font-size:22px;color:#706b62;font-weight:normal}.list-translit{color:#706b62;margin-top:3px}.list-sentence{font-size:18px;direction:rtl;margin-top:9px}.empty{padding:30px;text-align:center;color:#706b62;background:#f1eee5;border-radius:16px}</style></head><body><main class="wrap"><header class="top"><div class="brand"><div class="logo">ش</div><div><h1>שְוַי שְוַי</h1><p class="sub">ערבית פלסטינית, מילה אחת בכל פעם</p></div></div><div class="top-actions"><button id="shuffleButton" class="icon-button on" type="button" onclick="toggleShuffle()" title="שאפל פעיל" aria-label="שאפל פעיל">🔀</button><button class="reset" type="button" onclick="resetQuiz()">התחלה מחדש</button></div></header>
<section id="quizPage" class="card"><div class="status"><span id="counter">1 מתוך 10</span><div class="status-links"><button class="status-link" onclick="showList('known')"><span id="knownCount">0</span> ידועות</button><button class="status-link" onclick="showList('retry')"><span id="retryCount">0</span> לחזרה</button></div></div><div class="bar"><i id="bar"></i></div><div class="word-line"><h2 id="arabicWord" class="word">مُجْبَر</h2><span id="wordTranslit" class="translit">מֻגְ'בַּר</span></div><p id="meta" class="meta">שורה 213 · בינוני פעול של أَجْبَرَ, בניין 4</p>
<div class="example"><p id="arabicSentence" class="sentence">هو <span style="color:#d44232;font-weight:800">مُجْبَر</span> يروح عالشغل بكير.</p></div>
<form id="form"><label>תרגום המילה<input id="word" placeholder="כתוב בעברית…" autocomplete="off"></label><button id="checkButton" class="check">בדיקה</button></form>
<section id="feedback" class="feedback" hidden><div id="badge" class="badge"></div><div id="correctionArea" class="cols"><div class="box"><h3>מה נכתב</h3><p id="mine"></p></div><div class="box"><h3>התיקון</h3><p id="correct"></p></div></div><div id="explanationArea" class="box explain"><h3>הסבר</h3><p id="why"></p></div></section><div class="navigation"><button id="previousButton" class="nav-button" type="button" onclick="previousWord()">מילה קודמת</button><button id="nextButton" class="nav-button" type="button" onclick="nextWord()">מילה הבאה</button></div></section>
<section id="listPage" class="card list-page" hidden><div class="list-head"><div><p class="label">אוצר המילים שלך</p><h2 id="listTitle"></h2></div><button class="reset" type="button" onclick="closeList()">חזרה לתרגול</button></div><div id="wordList" class="word-list"></div></section></main>
<script>
const API_URL='https://arabicapptest.roy-rachamim.workers.dev';
const STORAGE_KEY='shway-shway-progress-v1';
const VOCAB_CACHE_KEY='shway-shway-vocabulary-sherif-v2';
const SHEET_ID='1oOI5YFHJ2K8fDkMTykxogmslsszNNFZEd1Ol8Nwk6_U';
const SHEET_TABS=['שריף'];
let items=[
{w:'مُجْبَر',tr:'מֻגְ\'בַּר',m:['מוכרח','נאלץ'],s:'هو مُجْبَر يروح عالشغل بكير.',t:'הוא מוכרח ללכת לעבודה מוקדם.',r:213,f:'בינוני פעול של أَجْبَرَ, בניין 4'},
{w:'مُجْبِر',tr:'מֻגְ\'בִּר',m:['מכריח'],s:'القانون مُجْبِر الكل يلتزم.',t:'החוק מכריח את כולם לציית.',r:212,f:'בינוני פועל של أَجْبَرَ, בניין 4'},
{w:'إِجْبَار',tr:'אִגְ\'בַּאר',m:['כפייה','הכרחה'],s:'ما بدي أعمل هاد بالإجبار.',t:'אני לא רוצה לעשות את זה בכפייה.',r:211,f:'מצדר של أَجْبَرَ, בניין 4'},
{w:'أَجْبَرَ',tr:'אַגְ\'בַּר',m:['הכריח'],s:'هو أجبرني أغيّر رأيي.',t:'הוא הכריח אותי לשנות את דעתי.',r:210,f:'פועל, בניין 4'},
{w:'مُقْتَبَس',tr:'מֻקְתַבַּס',m:['מצוטט'],s:'هاد الكلام مُقْتَبَس من كتاب.',t:'הדברים האלה מצוטטים מתוך ספר.',r:209,f:'בינוני פעול של اِقْتَبَسَ, בניין 8'},
{w:'مُقْتَبِس',tr:'מֻקְתַבִּס',m:['מצטט'],s:'الكاتب مُقْتَبِس جملة مشهورة.',t:'הכותב מצטט משפט מפורסם.',r:208,f:'בינוני פועל של اِقْتَبَسَ, בניין 8'},
{w:'اِقْتِبَاس',tr:'אִקְתִבַּאס',m:['ציטוט'],s:'حطّ اقتباس بأول المقال.',t:'הוא שם ציטוט בתחילת המאמר.',r:207,f:'מצדר של اِقْتَبَسَ, בניין 8'},
{w:'مَبَادِئ',tr:'מַבַּאדִא',m:['עקרונות'],s:'عنده مبادئ واضحة بحياته.',t:'יש לו עקרונות ברורים בחיים.',r:206,f:'רבים של مَبْدَأ'},
{w:'مَبْدَأ',tr:'מַבְּדַא',m:['עיקרון'],s:'المساواة مبدأ مهم.',t:'שוויון הוא עיקרון חשוב.',r:205,f:'שם עצם'},
{w:'قِيَم',tr:'קִיַם',m:['ערכים'],s:'تربّينا على نفس القيم.',t:'גדלנו על אותם הערכים.',r:204,f:'רבים של قِيمَة'}];
let index=0,knownWords=[],retryWords=[],shuffleOn=true,order=[];
const by=id=>document.getElementById(id),form=by('form'),feedback=by('feedback');
function itemKey(q){return q.id||q.w}
function saveProgress(){localStorage.setItem(STORAGE_KEY,JSON.stringify({known:knownWords.map(itemKey),retry:retryWords.map(itemKey),shuffle:shuffleOn}))}
function loadProgress(){try{const saved=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');const find=k=>items.find(q=>itemKey(q)===k)||items.find(q=>q.w===k);knownWords=(saved.known||[]).map(find).filter(Boolean);retryWords=(saved.retry||[]).map(find).filter(Boolean);if(typeof saved.shuffle==='boolean')shuffleOn=saved.shuffle}catch(error){console.warn('Could not load progress',error)}}
function parseCsv(text){const rows=[];let row=[],cell='',quoted=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c==='"'&&quoted&&n==='"'){cell+='"';i++}else if(c==='"'){quoted=!quoted}else if(c===','&&!quoted){row.push(cell);cell=''}else if((c==='\n'||c==='\r')&&!quoted){if(c==='\r'&&n==='\n')i++;row.push(cell);if(row.some(v=>v!==''))rows.push(row);row=[];cell=''}else cell+=c}row.push(cell);if(row.some(v=>v!==''))rows.push(row);return rows}
function grammar(type,binyan){const t=(type||'').trim().toLowerCase(),b=(binyan||'').trim();if(t==='verb')return 'פועל'+(b?' · בניין '+b:'');if(t==='noun')return 'שם עצם';return [type,b&&'בניין '+b].filter(Boolean).join(' · ')||'ללא סיווג'}
function rowsToItems(rows,tab){if(rows.length<2)return[];const headers=rows[0].map(h=>h.trim().toLowerCase()),col=name=>headers.indexOf(name.toLowerCase());return rows.slice(1).map((r,i)=>{const active=col('Active')<0?'TRUE':String(r[col('Active')]||'').trim().toUpperCase(),s=col('Example')<0?'':(r[col('Example')]||'').trim(),t=col('Example Hebrew')<0?'':(r[col('Example Hebrew')]||'').trim();return{id:r[col('ID')]||tab+'_'+String(i+1).padStart(4,'0'),w:(r[col('Arabic')]||'').trim(),m:(r[col('Hebrew')]||'').split(/\s*\/\s*/).filter(Boolean),tr:(r[col('Transliteration')]||'').trim(),f:grammar(r[col('Type')],r[col('Binyan')]),s,t,aiLoaded:Boolean(s&&t),r:i+2,source:tab,active:!['FALSE','0','NO'].includes(active)}}).filter(q=>q.w&&q.m.length&&q.active)}
async function loadVocabulary(){const fallback=items;try{const groups=await Promise.all(SHEET_TABS.map(async tab=>{const url=`${API_URL}?action=vocabulary&sheet=${encodeURIComponent(tab)}`;const response=await fetch(url,{cache:'no-store'});if(!response.ok)throw new Error('Vocabulary API '+response.status);return rowsToItems(parseCsv(await response.text()),tab)}));const fresh=groups.flat();if(!fresh.length)throw new Error('לא נמצאו מילים פעילות');items=fresh;localStorage.setItem(VOCAB_CACHE_KEY,JSON.stringify(fresh));localStorage.removeItem('shway-shway-vocabulary-v1')}catch(error){console.warn('Could not refresh vocabulary',error);try{const cached=JSON.parse(localStorage.getItem(VOCAB_CACHE_KEY)||'[]');items=cached.length?cached:fallback}catch{items=fallback}}}
function shuffled(a){return [...a].sort(()=>Math.random()-.5)}
function updateCounts(){by('knownCount').textContent=knownWords.length;by('retryCount').textContent=retryWords.length}
function addUnique(list,q){if(!list.some(x=>itemKey(x)===itemKey(q)))list.push(q)}
function removeWord(list,q){const i=list.findIndex(x=>itemKey(x)===itemKey(q));if(i>=0)list.splice(i,1)}
function highlightWord(q){if(!q.s)return'';const bare=q.w.replace(/[\u064B-\u065F\u0670]/g,'');const core=[...bare].map(c=>c.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'[\\u064B-\\u065F\\u0670]*').join('');const token='[\\u0621-\\u064A\\u064B-\\u065F\\u0670]*'+core+'[\\u0621-\\u064A\\u064B-\\u065F\\u0670]*';return q.s.replace(new RegExp(token,'u'),m=>'<span style="color:#d44232;font-weight:800;font-family:inherit">'+m+'</span>')}
function highlightHebrew(q){let stem=q.m.find(m=>q.t.includes(m));if(!stem)stem=q.m.map(m=>m.replace(/ים$/,'')).find(m=>q.t.includes(m));stem=stem||q.m[0];const safe=stem.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return q.t.replace(new RegExp('[א-ת״׳\"\']*'+safe+'[א-ת״׳\"\']*','u'),m=>'<span style="color:#d44232;font-weight:800;font-family:inherit">'+m+'</span>')}
async function api(body){const response=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const data=await response.json();if(!response.ok)throw new Error(data.error||'שגיאה בחיבור ל-AI');return data}
function draw(){const q=order[index];if(!q)return;by('counter').textContent=(index+1)+' מתוך '+order.length;updateCounts();by('bar').style.width=((index+1)/order.length*100)+'%';by('arabicWord').textContent=q.w;by('wordTranslit').textContent=q.tr;by('meta').textContent=q.f;by('arabicSentence').innerHTML=q.s?highlightWord(q):'למילה הזאת עדיין לא נוסף משפט לדוגמה בגיליון.';by('word').value='';by('checkButton').disabled=false;by('checkButton').textContent='בדיקה';by('previousButton').disabled=index===0;form.hidden=false;feedback.hidden=true;by('correctionArea').hidden=true;by('explanationArea').hidden=true;by('word').focus()}
function normalizeHebrew(value){return String(value||'').normalize('NFKD').replace(/[\u0591-\u05C7]/g,'').replace(/["'׳״.,!?;:()\-]/g,' ').replace(/\s+/g,' ').trim().toLowerCase()}
function matchesLocally(answer,meanings){const normalized=normalizeHebrew(answer);return meanings.some(meaning=>normalizeHebrew(meaning)===normalized)}
form.addEventListener('submit',async function(e){e.preventDefault();const q=order[index],w=by('word').value.trim(),button=by('checkButton');button.disabled=true;button.textContent='בודק…';try{const localMatch=matchesLocally(w,q.m);const result=!w?{correct:false,correction:q.m.join(' / '),explanation:'לא הוזן תרגום.'}:localMatch?{correct:true,correction:'',explanation:''}:await api({action:'evaluate',word:q.w,acceptedMeanings:q.m,answer:w,sentence:q.s,sentenceTranslation:q.t});const ok=result.correct;if(ok){addUnique(knownWords,q);removeWord(retryWords,q)}else{addUnique(retryWords,q);removeWord(knownWords,q)}saveProgress();updateCounts();const b=by('badge');b.textContent=ok?'✅ התרגום שכתבת נכון':'🔁 המילה נוספה לעמוד החזרה';b.className='badge '+(ok?'good':'bad');by('correctionArea').hidden=ok;by('explanationArea').hidden=ok||!result.explanation;if(!ok){by('mine').textContent=w||'לא נכתבה תשובה';by('correct').textContent=result.correction||q.m.join(' / ');by('why').textContent=result.explanation||''}form.hidden=true;feedback.hidden=false;by('nextButton').textContent=index===order.length-1?'התחלה מחדש':'למילה הבאה'}catch(error){console.error(error);addUnique(retryWords,q);removeWord(knownWords,q);saveProgress();updateCounts();const b=by('badge');b.textContent='🔁 לא התקבלה בדיקת AI — המילה נוספה לחזרה';b.className='badge bad';by('mine').textContent=w||'לא נכתבה תשובה';by('correct').textContent=q.m.join(' / ');by('why').textContent='הבדיקה החכמה לא הייתה זמינה, לכן מוצג התרגום מהגיליון.';by('correctionArea').hidden=false;by('explanationArea').hidden=false;form.hidden=true;feedback.hidden=false;button.disabled=false;button.textContent='בדיקה'}});
function newRound(){index=0;order=shuffleOn?shuffled(items):[...items];draw()}
function nextWord(){if(index===order.length-1){newRound();return}index++;draw()}
function previousWord(){if(index===0)return;index--;draw()}
function resetQuiz(){if(!confirm('לאפס את כל ההתקדמות?'))return;knownWords=[];retryWords=[];saveProgress();newRound()}
function toggleShuffle(){shuffleOn=!shuffleOn;saveProgress();const b=by('shuffleButton');b.textContent=shuffleOn?'🔀':'⇥';b.classList.toggle('on',shuffleOn);b.title=shuffleOn?'שאפל פעיל':'שאפל כבוי';b.setAttribute('aria-label',b.title)}
function showList(type){const list=type==='known'?knownWords:retryWords;by('listTitle').textContent=type==='known'?'מילים ידועות':'מילים לחזרה';by('wordList').innerHTML=list.length?list.map(q=>'<div class="word-row"><div><div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap"><span style="font-size:31px;direction:rtl">'+q.w+'</span><span style="font-size:14px;color:#706b62">('+q.tr+') — '+q.m.join(' / ')+'</span></div><div style="font-size:13px;color:#8b857a;margin-top:5px">'+q.f+'</div>'+(q.s?'<div class="list-sentence">'+highlightWord(q)+'</div><div style="font-size:15px;color:#514d46;margin-top:5px">'+highlightHebrew(q)+'</div>':'')+'</div></div>').join(''):'<div class="empty">הרשימה עדיין ריקה</div>';by('quizPage').hidden=true;by('listPage').hidden=false}
function closeList(){by('listPage').hidden=true;by('quizPage').hidden=false}
window.nextWord=nextWord;window.previousWord=previousWord;window.resetQuiz=resetQuiz;window.toggleShuffle=toggleShuffle;window.showList=showList;window.closeList=closeList;(async()=>{by('arabicWord').textContent='טוען מילים…';by('wordTranslit').textContent='';form.hidden=true;await loadVocabulary();loadProgress();const shuffleButton=by('shuffleButton');shuffleButton.textContent=shuffleOn?'🔀':'⇥';shuffleButton.classList.toggle('on',shuffleOn);newRound()})();
</script></body></html>
