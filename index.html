<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#1cb0f6">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Shway Shway">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icons/icon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<title>Shway Shway</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>


<link rel="stylesheet" href="./styles.css">
</head>
<body>
<main class="wrap">
  <header class="top">
    <button id="menuButton" class="icon-button" type="button" title="תפריט">☰</button>
    <button id="settingsButton" class="icon-button" type="button" title="הגדרות" aria-label="הגדרות">⚙</button>
    <button id="headerHomeButton" class="icon-button header-home" type="button" title="חזרה למסך הבית" aria-label="חזרה למסך הבית" hidden>‹</button>
    <button id="listBack" class="icon-button header-home" type="button" title="חזרה" aria-label="חזרה" hidden>‹</button>
  </header>

  <section id="homePage" class="home-page">
    <div><h2 class="home-heading">השיעורים שלי</h2><p class="muted" style="margin:0">בחר שיעור כדי לראות את המילים ולהתחיל סט</p></div>
    <div id="lessonList" class="lesson-list"></div>
    <button id="allLessonsButton" class="primary all-lessons-button" type="button">כל המילים והתרגול המשולב</button>
  </section>

  <section id="lessonPage" class="lesson-page" hidden>
    <h2 id="lessonTitle" class="lesson-title"></h2>
    <div id="featuredCard" class="card home-feature" tabindex="0" aria-label="מילה מהשיעור. החליקו ימינה או שמאלה למעבר בין מילים">
      <button id="featuredAudio" class="audio-button" type="button" title="השמעת המילה והמשפט" aria-label="השמעת המילה ואז המשפט"></button>
      <div class="word-content"><div class="word-line"><h2 id="featuredWord" class="word"></h2><span id="featuredTranslit" class="translit"></span></div>
      <p id="featuredMeaning" class="word-meaning"></p><div id="featuredMeta" class="meta-tags"></div>
      <div class="example"><p id="featuredSentence" class="sentence"></p></div></div>
    </div>
    <div class="dashboard-list">
      <button class="dashboard-row" type="button" data-home-list="all"><span><strong>כל המילים</strong></span><span id="allRing" class="progress-ring"><b id="homeAllCount">0</b></span></button>
      <button class="dashboard-row" type="button" data-home-list="unseen"><span><strong>עוד לא למדתי</strong></span><span id="unseenRing" class="progress-ring"><b id="homeUnseenCount">0</b></span></button>
      <button class="dashboard-row" type="button" data-home-list="retry"><span><strong>מילים לחזרה</strong></span><span id="retryRing" class="progress-ring"><b id="homeRetryCount">0</b></span></button>
    </div>
    <button id="practiceButton" class="primary home-practice" type="button">תרגול השיעור</button>
  </section>

  <section id="quizPage" hidden>
    <div id="sessionProgress" class="session-progress"><span>טוען…</span></div>
    <div class="word-card-viewport"><div id="wordCard" class="card word-card">
      <div id="successPop" class="success-pop" hidden><div class="success-check">✓</div></div>
      <button id="quizAudio" class="audio-button" type="button" title="השמעת המילה והמשפט" aria-label="השמעת המילה ואז המשפט"></button>
      <div class="word-content"><div class="word-line"><h2 id="arabicWord" class="word"></h2><span id="wordTranslit" class="translit"></span></div>
      <div id="meta" class="meta-tags"></div>
      <div class="example"><p id="arabicSentence" class="sentence"></p></div></div>
      <form id="form"><input id="word" aria-label="תרגום המילה" placeholder="תרגום המילה" autocomplete="off"><button id="checkButton" class="check" type="button">בדיקה</button><span id="keyboardSpacer" class="keyboard-spacer" aria-hidden="true"></span></form>
      <section id="feedback" class="feedback" hidden>
        <div id="wrongAnswerBox" class="answer-state wrong-answer"><span class="answer-icon">×</span><div class="answer-content"><p id="mine"></p></div></div>
        <div class="answer-state correct-answer"><span class="answer-icon">✓</span><div class="answer-content"><small>התשובה הנכונה</small><p id="correct"></p><p id="correctSentence" class="sentence-translation"></p></div></div>
        <p id="retryNotice" class="retry-notice">נוסף לרשימת המילים לחזרה</p>
      </section>
    </div></div>
    <div class="navigation"><button id="previousButton" class="nav-button" type="button">מילה קודמת</button><button id="nextButton" class="nav-button" type="button">דילוג</button></div>
  </section>

  <section id="summaryPage" class="card" hidden>
    <div class="summary-head"><div><p class="muted" style="margin:0 0 5px">הסט הסתיים</p><h2 style="margin:0">סיכום הסט</h2></div></div>
    <p id="summaryStats" class="summary-stats"></p><div id="summaryList" class="summary-list"></div>
    <button id="continueButton" class="primary" type="button" style="width:100%;margin-top:22px">המשך לסט הבא</button>
  </section>

  <section id="listPage" class="card" hidden>
    <div class="list-head"><h2 id="listTitle" style="margin:0"></h2></div><button id="listPractice" class="primary list-practice" type="button">תרגול הרשימה</button><div id="wordList" class="word-list"></div>
  </section>
</main>

<div id="drawerOverlay" class="drawer-overlay" hidden></div>
<aside id="drawer" class="drawer" hidden>
  <div class="drawer-head"><h2 style="margin:0">תפריט</h2><button id="closeMenu" class="icon-button" type="button">✕</button></div>
  <div class="menu-list">
    <button id="homeButton" class="menu-row" type="button"><span>מסך הבית</span><strong>⌂</strong></button>
    <button class="menu-row" data-list="all"><span>כל המילים</span><strong id="totalCount">0</strong></button>
    <button class="menu-row" data-list="known"><span>מילים שאני יודע</span><strong id="knownCount">0</strong></button>
    <button class="menu-row" data-list="unseen"><span>עוד לא למדתי</span><strong id="unseenCount">0</strong></button>
    <button class="menu-row" data-list="retry"><span>מילים לחזרה</span><strong id="retryCount">0</strong></button>
  </div>
</aside>

<aside id="settingsDrawer" class="drawer settings-drawer" hidden>
  <div class="drawer-head"><h2 style="margin:0">הגדרות</h2><button id="closeSettings" class="icon-button" type="button">✕</button></div>
  <div class="user-box"><div class="muted" style="font-size:12px;margin-bottom:7px">משתמש</div><div id="googleSignIn" class="google-login"></div><div id="googleProfile" class="google-profile" hidden><img id="googlePicture" alt=""><span class="google-profile-copy"><strong id="googleName"></strong><small id="googleEmail" class="muted"></small></span></div><button id="googleSignOut" class="google-signout" type="button" hidden>התנתקות מחשבון Google</button><div id="recoveryTools"><div class="muted" style="font-size:11px;margin-top:5px">קוד שחזור חלופי</div><div id="userCode" class="cloud-code"></div><div class="cloud-tools"><button id="copyUserCode" type="button">העתקת קוד</button><button id="restoreUserCode" type="button">שחזור</button></div></div><div id="cloudStatus" class="cloud-status">מתחבר לשמירה בענן…</div></div>
  <div class="menu-list">
    <button id="shuffleButton" class="menu-row active" type="button"><span>ערבוב מילים</span><strong class="menu-icon">🔀</strong></button>
  </div>
  <button id="resetProgress" class="menu-row danger" type="button"><span>איפוס התקדמות</span><strong>↻</strong></button>
  <p id="appVersion" class="app-version">Shway Shway v19.0</p>
</aside>

<script src="./app.js" defer></script>
</body>
</html>
