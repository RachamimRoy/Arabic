<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>שְוַי שְוַי</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f1eddf;color:#24221e;font-family:Arial,sans-serif}.wrap{width:min(720px,calc(100% - 28px));margin:28px auto}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}.brand{display:flex;gap:12px;align-items:center}.logo{background:#24221e;color:#ffd75a;width:54px;height:54px;border-radius:17px;display:grid;place-items:center;font-size:30px;font-weight:bold}h1{margin:0;font-size:24px}.sub{margin:4px 0 0;color:#706b62}.top-actions{display:flex;gap:8px}.icon-button,.reset{border:2px solid #24221e;border-radius:13px;background:transparent;cursor:pointer}.icon-button{width:46px;height:46px;padding:0;font-size:21px}.icon-button.on{background:#24221e;color:#ffd75a}.reset{padding:12px 18px;font-weight:bold;font-size:16px}.card{background:#fffdf6;border:2px solid #24221e;border-radius:25px;padding:28px;box-shadow:7px 7px 0 #24221e}.status{display:flex;justify-content:space-between;color:#706b62;font-size:14px}.bar{height:8px;border-radius:8px;background:#e6e0d2;margin:10px 0 28px;overflow:hidden}.bar i{display:block;height:100%;background:#368b69}.word-line{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}.word{font-size:50px;margin:0;direction:rtl}.translit{font-size:22px;color:#706b62}.meta{color:#706b62;margin:5px 0 20px}.example{background:#f1eee5;border-radius:17px;padding:16px 18px;margin-bottom:22px}.sentence{font-size:23px;direction:rtl;margin:7px 0;line-height:1.7}.target{color:#d44232;font-weight:800;font-family:inherit}label{display:block;font-weight:bold;font-size:14px;margin:14px 0}input{display:block;width:100%;margin-top:7px;border:2px solid #ddd6c5;border-radius:13px;padding:13px;font:16px Arial}.check,.nav-button,.primary{border:2px solid #24221e;border-radius:13px;padding:12px 18px;font-weight:bold;font-size:16px;cursor:pointer}.check,.primary{background:#ffd75a;box-shadow:3px 3px 0 #24221e}.check{width:100%}.feedback{border-top:2px dashed #ddd6c5;margin-top:24px;padding-top:22px}.badge{font-weight:bold;margin-bottom:15px}.cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}.box{border:1px solid #ddd6c5;border-radius:13px;padding:12px}.box h3{font-size:12px;color:#706b62;margin:0 0 7px}.box p{margin:0;line-height:1.55;white-space:pre-line}.explain{margin:12px 0}.good{color:#287b5a}.bad{color:#c34e40}.navigation{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:22px}.nav-button{background:#fffdf6}.nav-button:last-child{background:#ffd75a}.nav-button:disabled{opacity:.35;cursor:not-allowed}.dots{direction:ltr;letter-spacing:4px;white-space:nowrap;font-size:18px}.list-head,.summary-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:20px}.word-list,.summary-list{display:grid;gap:10px}.word-row,.summary-row{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;padding:14px 16px;border:1px solid #ddd6c5;border-radius:14px;background:#fff}.list-word{font-size:31px;direction:rtl}.list-line{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}.muted{color:#706b62}.list-sentence{font-size:18px;direction:rtl;margin-top:9px}.empty{padding:30px;text-align:center;color:#706b62;background:#f1eee5;border-radius:16px}.summary-stats{font-size:18px;margin:0 0 20px}.result-icon{font-size:20px}.drawer-overlay{position:fixed;inset:0;background:rgba(36,34,30,.45);z-index:20}.drawer{position:fixed;right:0;top:0;bottom:0;width:min(360px,88vw);background:#fffdf6;border-left:2px solid #24221e;z-index:21;padding:24px;overflow:auto}.drawer-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.user-box{background:#f1eee5;border-radius:15px;padding:15px;margin-bottom:14px}.menu-list{display:grid;gap:8px}.menu-row{display:flex;justify-content:space-between;align-items:center;width:100%;padding:14px;border:1px solid #ddd6c5;border-radius:13px;background:#fff;cursor:pointer;font:16px Arial;text-align:right}.danger{width:100%;margin-top:24px;border:0;background:transparent;color:#c34e40;font-weight:bold;cursor:pointer;padding:14px}.review-note{margin-top:8px;color:#706b62;font-size:13px}[hidden]{display:none!important}@media(max-width:560px){.wrap{margin-top:15px}.card{padding:20px;box-shadow:5px 5px 0 #24221e}.sub{display:none}.cols{grid-template-columns:1fr}.word{font-size:43px}.top-actions{gap:5px}.icon-button{width:42px;height:42px}.summary-row{padding:12px}}
</style>
</head>
<body>
<main class="wrap">
  <header class="top">
    <div class="brand"><div class="logo">ش</div><div><h1>שְוַי שְוַי</h1><p class="sub">ערבית פלסטינית, מילה אחת בכל פעם</p></div></div>
    <div class="top-actions"><button id="shuffleButton" class="icon-button on" type="button" title="שאפל פעיל">🔀</button><button id="menuButton" class="icon-button" type="button" title="תפריט">☰</button></div>
  </header>

  <section id="quizPage" class="card">
    <div class="status"><span id="counter">טוען מילים…</span><span id="setLabel">סט של 10 מילים</span></div>
    <div class="bar"><i id="bar" style="width:0"></i></div>
    <div class="word-line"><h2 id="arabicWord" class="word"></h2><span id="wordTranslit" class="translit"></span></div>
    <p id="meta" class="meta"></p>
    <div class="example"><p id="arabicSentence" class="sentence"></p></div>
    <form id="form"><label>תרגום המילה<input id="word" placeholder="כתוב בעברית…" autocomplete="off"></label><button id="checkButton" class="check">בדיקה</button></form>
    <section id="feedback" class="feedback" hidden><div id="badge" class="badge"></div><div id="correctionArea" class="cols"><div class="box"><h3>מה נכתב</h3><p id="mine"></p></div><div class="box"><h3>התיקון</h3><p id="correct"></p></div></div><div id="explanationArea" class="box explain"><h3>הסבר</h3><p id="why"></p></div><div id="reviewProgress" class="review-note"></div></section>
    <div class="navigation"><button id="previousButton" class="nav-button" type="button">מילה קודמת</button><button id="nextButton" class="nav-button" type="button">דילוג</button></div>
  </section>

  <section id="summaryPage" class="card" hidden>
    <div class="summary-head"><div><p class="muted" style="margin:0 0 5px">הסט הסתיים</p><h2 style="margin:0">סיכום הסט</h2></div></div>
    <p id="summaryStats" class="summary-stats"></p><div id="summaryList" class="summary-list"></div>
    <button id="continueButton" class="primary" type="button" style="width:100%;margin-top:22px">המשך לסט הבא</button>
  </section>

  <section id="listPage" class="card" hidden>
    <div class="list-head"><h2 id="listTitle" style="margin:0"></h2><button id="listBack" class="reset" type="button">חזרה לתרגול</button></div><div id="wordList" class="word-list"></div>
  </section>
</main>

<div id="drawerOverlay" class="drawer-overlay" hidden></div>
<aside id="drawer" class="drawer" hidden>
  <div class="drawer-head"><h2 style="margin:0">תפריט</h2><button id="closeMenu" class="icon-button" type="button">✕</button></div>
  <div class="user-box"><div class="muted" style="font-size:12px;margin-bottom:4px">שם משתמש</div><strong>אורח</strong></div>
  <div class="menu-list">
    <button class="menu-row" data-list="all"><span>כל המילים</span><strong id="totalCount">0</strong></button>
    <button class="menu-row" data-list="known"><span>מילים שאני יודע</span><strong id="knownCount">0</strong></button>
    <button class="menu-row" data-list="unseen"><span>עוד לא למדתי</span><strong id="unseenCount">0</strong></button>
    <button class="menu-row" data-list="retry"><span>מילים לחזרה</span><strong id="retryCount">0</strong></button>
  </div>
  <button id="resetProgress" class="danger" type="button">איפוס התקדמות</button>
</aside>

<script>
const API_URL='https://arabicapptest.roy-rachamim.workers.dev';
const STORAGE_KEY='shway-shway-session-progress-v1';
const LEGACY_KEYS=['shway-shway-progress-v2','shway-shway-progress-v1'];
const SHEET_TABS=['שריף'];
let items=[],order=[],index=0,sessionNumber=0,sessionResults={},progress={},shuffleOn=true;
const by=id=>document.getElementById(id);
const form=by('form'),feedback=by('feedback');

function itemKey(q){return q.id||q.w}
function shuffled(a){return [...a].sort(()=>Math.random()-.5)}
function normalizeHebrew(value){return String(value||'').normalize('NFKD').replace(/[\u0591-\u05C7]/g,'').replace(/["'׳״.,!?;:()\-]/g,' ').replace(/\s+/g,' ').trim().toLowerCase()}
function matchesLocally(answer,meanings){const normalized=normalizeHebrew(answer);return meanings.some(m=>normalizeHebrew(m)===normalized)}
function dots(n){return '<span class="dots" aria-label="'+n+' מתוך 3 הצלחות">'+'●'.repeat(n)+'○'.repeat(3-n)+'</span>'}
function grammar(type,binyan){const t=(type||'').trim().toLowerCase(),b=(binyan||'').trim();if(t==='verb')return 'פועל'+(b?' · בניין '+b:'');if(t==='noun')return 'שם עצם';if(t==='adj')return 'שם תואר';if(t==='expression')return 'ביטוי';if(t==='masdar')return 'מצדר'+(b?' · בניין '+b:'');return [type,b&&'בניין '+b].filter(Boolean).join(' · ')||'ללא סיווג'}
function parseCsv(text){const rows=[];let row=[],cell='',quoted=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c==='"'&&quoted&&n==='"'){cell+='"';i++}else if(c==='"')quoted=!quoted;else if(c===','&&!quoted){row.push(cell);cell=''}else if((c==='\n'||c==='\r')&&!quoted){if(c==='\r'&&n==='\n')i++;row.push(cell);if(row.some(v=>v!==''))rows.push(row);row=[];cell=''}else cell+=c}row.push(cell);if(row.some(v=>v!==''))rows.push(row);return rows}
function rowsToItems(rows,tab){if(rows.length<2)return[];const h=rows[0].map(v=>v.trim().toLowerCase()),col=n=>h.indexOf(n.toLowerCase());return rows.slice(1).map((r,i)=>{const active=col('Active')<0?'TRUE':String(r[col('Active')]||'').trim().toUpperCase();return{id:r[col('ID')]||tab+'_'+(i+1),w:(r[col('Arabic')]||'').trim(),m:(r[col('Hebrew')]||'').split(/\s*\/\s*/).filter(Boolean),tr:(r[col('Transliteration')]||'').trim(),f:grammar(r[col('Type')],r[col('Binyan')]),s:col('Example')<0?'':(r[col('Example')]||'').trim(),t:col('Example Hebrew')<0?'':(r[col('Example Hebrew')]||'').trim(),active:!['FALSE','0','NO'].includes(active)}}).filter(q=>q.w&&q.m.length&&q.active)}
async function loadVocabulary(){const groups=await Promise.all(SHEET_TABS.map(async tab=>{const response=await fetch(`${API_URL}?action=vocabulary&sheet=${encodeURIComponent(tab)}`,{cache:'no-store'});if(!response.ok)throw new Error('Vocabulary API '+response.status);return rowsToItems(parseCsv(await response.text()),tab)}));items=groups.flat();if(!items.length)throw new Error('לא נמצאו מילים פעילות')}
async function api(body){const response=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const data=await response.json();if(!response.ok)throw new Error(data.error||'שגיאה בחיבור ל-AI');return data}

function saveState(){const payload={version:1,sessionNumber,progress,current:{ids:order.map(itemKey),index,results:sessionResults},shuffleOn,savedAt:new Date().toISOString()};localStorage.setItem(STORAGE_KEY,JSON.stringify(payload));if(!localStorage.getItem(STORAGE_KEY))throw new Error('הדפדפן לא שמר את ההתקדמות')}
function migrateLegacy(){for(const key of LEGACY_KEYS){try{const old=JSON.parse(localStorage.getItem(key)||'null');if(!old)continue;for(const ref of old.known||[]){const id=typeof ref==='string'?ref:ref.id;if(id)progress[id]={status:'known',successes:3,dueSet:null}}for(const ref of old.retry||[]){const id=typeof ref==='string'?ref:ref.id;if(id)progress[id]={status:'retry',successes:0,dueSet:2}}if(typeof old.shuffle==='boolean')shuffleOn=old.shuffle;return}catch{}}}
function loadState(){try{const saved=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');if(!saved){migrateLegacy();return}sessionNumber=saved.sessionNumber||0;progress=saved.progress||{};shuffleOn=saved.shuffleOn!==false;const ids=saved.current?.ids||[];order=ids.map(id=>items.find(q=>itemKey(q)===id)).filter(Boolean);index=Math.min(saved.current?.index||0,Math.max(0,order.length-1));sessionResults=saved.current?.results||{}}catch(error){console.error(error);alert('לא הצלחנו לטעון את ההתקדמות השמורה.')}}
function stateOf(q){return progress[itemKey(q)]?.status||'unseen'}
function getStats(){return{all:items.length,known:items.filter(q=>stateOf(q)==='known').length,unseen:items.filter(q=>stateOf(q)==='unseen').length,retry:items.filter(q=>stateOf(q)==='retry').length}}
function updateCounts(){const s=getStats();by('totalCount').textContent=s.all;by('knownCount').textContent=s.known;by('unseenCount').textContent=s.unseen;by('retryCount').textContent=s.retry}

function buildSession(){sessionNumber++;sessionResults={};index=0;const eligible=items.filter(q=>{const p=progress[itemKey(q)];return p?.status==='retry'&&(p.dueSet||0)<=sessionNumber});const reviewTarget=Math.min(eligible.length,2+Math.floor(Math.random()*3));const reviews=shuffled(eligible).slice(0,reviewTarget);const used=new Set(reviews.map(itemKey));const unseen=shuffled(items.filter(q=>stateOf(q)==='unseen'&&!used.has(itemKey(q))));const known=shuffled(items.filter(q=>stateOf(q)==='known'&&!used.has(itemKey(q))));const waiting=shuffled(items.filter(q=>stateOf(q)==='retry'&&!used.has(itemKey(q))));order=[...reviews,...unseen,...known,...waiting].slice(0,10);if(shuffleOn)order=shuffled(order);saveState();showQuiz();draw()}
function currentResult(){return sessionResults[itemKey(order[index])]}
function highlightWord(q){if(!q.s)return'';const bare=q.w.replace(/[\u064B-\u065F\u0670]/g,'');const core=[...bare].map(c=>c.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'[\\u064B-\\u065F\\u0670]*').join('');const token='[\\u0621-\\u064A\\u064B-\\u065F\\u0670]*'+core+'[\\u0621-\\u064A\\u064B-\\u065F\\u0670]*';return q.s.replace(new RegExp(token,'u'),m=>'<span class="target">'+m+'</span>')}
function highlightHebrew(q){if(!q.t)return'';let stem=q.m.find(m=>q.t.includes(m))||q.m.map(m=>m.replace(/ים$/,'')).find(m=>q.t.includes(m))||q.m[0];const safe=stem.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return q.t.replace(new RegExp('[א-ת״׳"\']*'+safe+'[א-ת״׳"\']*','u'),m=>'<span class="target">'+m+'</span>')}

function draw(){const q=order[index];if(!q)return;const result=currentResult();by('counter').textContent=(index+1)+' מתוך '+order.length;by('setLabel').textContent='סט '+sessionNumber+' · 10 מילים';by('bar').style.width=((index+1)/order.length*100)+'%';by('arabicWord').textContent=q.w;by('wordTranslit').textContent=q.tr;by('meta').textContent=q.f;by('arabicSentence').innerHTML=q.s?highlightWord(q):'למילה הזאת עדיין לא נוסף משפט לדוגמה בגיליון.';by('previousButton').disabled=index===0;by('word').value=result?.answer||'';if(result){form.hidden=true;renderFeedback(q,result)}else{form.hidden=false;feedback.hidden=true;by('checkButton').disabled=false;by('checkButton').textContent='בדיקה';by('word').focus()}by('nextButton').textContent=result?(index===order.length-1?'סיום הסט':'מילה הבאה'):(index===order.length-1?'דילוג וסיום':'דילוג');updateCounts()}
function renderFeedback(q,result){feedback.hidden=false;const ok=result.status==='correct';by('badge').textContent=ok?'✅ התרגום שכתבת נכון':result.status==='skipped'?'⏭ המילה דולגה ונוספה לחזרה':'🔁 המילה נוספה לחזרה';by('badge').className='badge '+(ok?'good':'bad');by('correctionArea').hidden=ok;by('explanationArea').hidden=ok||!result.explanation;if(!ok){by('mine').textContent=result.answer||'לא נכתבה תשובה';by('correct').textContent=result.correction||q.m.join(' / ');by('why').textContent=result.explanation||''}const p=progress[itemKey(q)];by('reviewProgress').innerHTML=p?.status==='retry'?'התקדמות בחזרה: '+dots(p.successes||0):''}
function applyOutcome(q,status,answer,details={}){const id=itemKey(q),wasRetry=progress[id]?.status==='retry';if(status==='correct'){if(wasRetry){const successes=Math.min(3,(progress[id].successes||0)+1);if(successes>=3)progress[id]={status:'known',successes:3,dueSet:null};else progress[id]={status:'retry',successes,dueSet:sessionNumber+(successes===1?3:6)}}else progress[id]={status:'known',successes:3,dueSet:null}}else progress[id]={status:'retry',successes:0,dueSet:sessionNumber+2};sessionResults[id]={status,answer:answer||'',correction:details.correction||q.m.join(' / '),explanation:details.explanation||'',wasRetry};saveState();draw()}

form.addEventListener('submit',async e=>{e.preventDefault();const q=order[index],answer=by('word').value.trim(),button=by('checkButton');button.disabled=true;button.textContent='בודק…';if(!answer){applyOutcome(q,'wrong','',{correction:q.m.join(' / '),explanation:'לא הוזן תרגום.'});return}if(matchesLocally(answer,q.m)){applyOutcome(q,'correct',answer);return}try{const result=await api({action:'evaluate',word:q.w,acceptedMeanings:q.m,answer,sentence:q.s,sentenceTranslation:q.t});applyOutcome(q,result.correct?'correct':'wrong',answer,result)}catch(error){console.error(error);applyOutcome(q,'wrong',answer,{correction:q.m.join(' / '),explanation:'בדיקת ה-AI לא הייתה זמינה, לכן מוצג התרגום מהגיליון.'})}});
function nextWord(){const q=order[index];if(!currentResult())applyOutcome(q,'skipped','');if(index===order.length-1){showSummary();return}index++;saveState();draw()}
function previousWord(){if(index===0)return;index--;saveState();draw()}

function showSummary(){saveState();by('quizPage').hidden=true;by('listPage').hidden=true;by('summaryPage').hidden=false;const results=order.map(q=>sessionResults[itemKey(q)]||{status:'skipped'}),correct=results.filter(r=>r.status==='correct').length;by('summaryStats').textContent=correct+' תשובות נכונות מתוך '+order.length;by('summaryList').innerHTML=order.map(q=>{const r=sessionResults[itemKey(q)]||{status:'skipped'},icon=r.status==='correct'?'✅':r.status==='skipped'?'⏭':'❌',p=progress[itemKey(q)];return '<div class="summary-row"><div><div class="list-line"><span class="list-word">'+q.w+'</span><span class="muted">('+q.tr+') — '+q.m.join(' / ')+'</span></div><div class="muted" style="font-size:13px;margin-top:4px">'+q.f+'</div></div><div><span class="result-icon">'+icon+'</span>'+(p?.status==='retry'?' '+dots(p.successes||0):'')+'</div></div>'}).join('')}
function showQuiz(){by('summaryPage').hidden=true;by('listPage').hidden=true;by('quizPage').hidden=false}

function openMenu(){updateCounts();by('drawer').hidden=false;by('drawerOverlay').hidden=false}
function closeMenu(){by('drawer').hidden=true;by('drawerOverlay').hidden=true}
function showList(type){closeMenu();const list=type==='all'?items:items.filter(q=>stateOf(q)===type),titles={all:'כל המילים',known:'מילים שאני יודע',unseen:'עוד לא למדתי',retry:'מילים לחזרה'};by('listTitle').textContent=titles[type];by('wordList').innerHTML=list.length?list.map(q=>{const p=progress[itemKey(q)];return '<div class="word-row"><div><div class="list-line"><span class="list-word">'+q.w+'</span><span class="muted">('+q.tr+') — '+q.m.join(' / ')+'</span></div><div class="muted" style="font-size:13px;margin-top:5px">'+q.f+'</div>'+(q.s?'<div class="list-sentence">'+highlightWord(q)+'</div><div class="muted" style="font-size:15px;margin-top:5px">'+highlightHebrew(q)+'</div>':'')+'</div>'+(type==='retry'?dots(p?.successes||0):'')+'</div>'}).join(''):'<div class="empty">הרשימה עדיין ריקה</div>';by('quizPage').hidden=true;by('summaryPage').hidden=true;by('listPage').hidden=false}
function resetAll(){if(!confirm('למחוק את כל ההתקדמות? המילים עצמן לא יימחקו.'))return;progress={};sessionResults={};order=[];index=0;sessionNumber=0;localStorage.removeItem(STORAGE_KEY);for(const key of LEGACY_KEYS)localStorage.removeItem(key);closeMenu();buildSession()}

by('nextButton').addEventListener('click',nextWord);by('previousButton').addEventListener('click',previousWord);by('continueButton').addEventListener('click',buildSession);by('menuButton').addEventListener('click',openMenu);by('closeMenu').addEventListener('click',closeMenu);by('drawerOverlay').addEventListener('click',closeMenu);by('resetProgress').addEventListener('click',resetAll);by('listBack').addEventListener('click',()=>{showQuiz();draw()});document.querySelectorAll('[data-list]').forEach(b=>b.addEventListener('click',()=>showList(b.dataset.list)));by('shuffleButton').addEventListener('click',()=>{shuffleOn=!shuffleOn;by('shuffleButton').textContent=shuffleOn?'🔀':'⇥';by('shuffleButton').classList.toggle('on',shuffleOn);saveState()});

(async()=>{try{await loadVocabulary();loadState();by('shuffleButton').textContent=shuffleOn?'🔀':'⇥';by('shuffleButton').classList.toggle('on',shuffleOn);if(order.length)draw();else buildSession()}catch(error){console.error(error);by('counter').textContent='לא הצלחנו לטעון את אוצר המילים';by('arabicSentence').textContent=error.message}})();
</script>
</body>
</html>
