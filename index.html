/* Light visual system */
:root{--blue:#1cb0f6;--blue-shadow:#168fca;--green:#14bd78;--yellow:#ffb800;--red:#ff452f;--line:#e8e8e8;--shadow:#e5e5e5;--soft:#f7f7f7;--text:#242424;--muted:#747474}
body{background:#fff;color:var(--text)}
.muted,.translit,.meta,.lesson-meta,.cloud-status{color:var(--muted)}
.card{background:#fff;border:2px solid var(--line);border-radius:11px;box-shadow:0 4px 0 var(--shadow)}
.lesson-card,.dashboard-row{background:#fff;border:2px solid var(--line);border-radius:11px;box-shadow:0 3px 0 var(--shadow)}
.word-row,.summary-row{background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 2px 0 var(--shadow)}
.icon-button,.reset{background:#fff;border:2px solid var(--line);border-radius:10px;box-shadow:0 3px 0 var(--shadow)}
.primary,.check{color:#fff;background:var(--blue);border:0;border-radius:9px;box-shadow:0 5px 0 var(--blue-shadow)}
.primary:active,.check:active{transform:translateY(3px);box-shadow:0 2px 0 var(--blue-shadow)}
.check:disabled{cursor:not-allowed;transform:none;box-shadow:0 4px 0 #a7aaad}
.check.is-loading{background:#c8cbce;color:#5f6367;box-shadow:0 4px 0 #a7aaad}
.loading-dots{display:inline-flex;direction:ltr;gap:3px;margin-inline-start:6px;vertical-align:middle}
.loading-dots i{display:block;width:5px;height:5px;border-radius:50%;background:currentColor;animation:loadingDot 1s ease-in-out infinite}
.loading-dots i:nth-child(2){animation-delay:.15s}.loading-dots i:nth-child(3){animation-delay:.3s}
@keyframes loadingDot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
.nav-button{background:#fff;border:2px solid var(--line);border-radius:9px;box-shadow:0 3px 0 var(--shadow)}
.nav-button:last-child{color:#fff;background:var(--blue);border-color:var(--blue);box-shadow:0 4px 0 var(--blue-shadow)}
input{background:#fff;border:2px solid var(--line);border-radius:9px;box-shadow:0 2px 0 var(--shadow);outline-color:var(--blue)}
.feedback{border-color:var(--line)}
.answer-state{border-radius:10px;box-shadow:0 2px 0 var(--shadow)}
.wrong-answer{border-color:var(--red)}.wrong-answer .answer-icon,.wrong-answer small,.bad,.retry-notice{color:var(--red)}
.correct-answer{border-color:var(--green)}.correct-answer .answer-icon,.correct-answer small,.good{color:var(--green)}
.sentence-translation{border-color:#d8f2e7}.target{color:var(--red)}
.progress-ring{background:conic-gradient(var(--ring) calc(var(--p)*1%),var(--line) 0)}.progress-ring:after{background:#fff}
.progress-segment{background:var(--line)}.progress-segment.correct{background:var(--green)}.progress-segment.wrong,.progress-segment.skipped{background:var(--red)}
.progress-segment.frontier{background:#fff}.progress-segment.current{box-shadow:0 0 0 2px #555}.progress-segment.correct.current{background:var(--green)}.progress-segment.wrong.current,.progress-segment.skipped.current{background:var(--red)}
.lesson-progress{background:var(--line)}.lesson-progress .known{background:var(--green)}.lesson-progress .retry{background:var(--red)}
.drawer{background:#fff;border-left:1px solid var(--line)}.drawer-overlay{background:rgba(36,36,36,.35)}
.user-box{background:var(--soft);border-radius:11px}.menu-row{border:1px solid var(--line);border-radius:10px;box-shadow:0 2px 0 var(--shadow)}.menu-row.active .menu-icon{color:var(--green)}
.cloud-tools button{border-color:var(--line);border-radius:8px;box-shadow:0 2px 0 var(--shadow)}
.empty{background:var(--soft);border-radius:10px}.success-pop{background:rgba(255,255,255,.92);border-radius:9px}.success-check{background:var(--green)}
.wrap.page-back-out{animation:pageBackOut .24s cubic-bezier(.4,0,1,1) both}.wrap.page-back-in{animation:pageBackIn .3s cubic-bezier(0,0,.2,1) both}
@keyframes pageBackOut{to{opacity:0;transform:translateX(32%)}}@keyframes pageBackIn{from{opacity:0;transform:translateX(-22%)}to{opacity:1;transform:translateX(0)}}
.home-feature{will-change:transform,opacity;transition:transform .22s ease-out,opacity .22s ease-out}.home-feature.dragging{transition:none;cursor:grabbing}.home-feature.drag-dismiss{pointer-events:none}
.drawer{display:block;transform:translateX(105%);transition:transform .3s cubic-bezier(.2,.8,.2,1);will-change:transform}.drawer.is-open{transform:translateX(0)}
.drawer-overlay{display:block;opacity:0;transition:opacity .25s ease}.drawer-overlay.is-open{opacity:1}

<body>
<main class="wrap">
  <header class="top">
    <button id="menuButton" class="icon-button" type="button" title="תפריט">☰</button>
    <button id="headerHomeButton" class="icon-button header-home" type="button" title="חזרה למסך הבית" aria-label="חזרה למסך הבית" hidden>‹</button>
  </header>

  <section id="homePage" class="home-page">
    <div><h2 class="home-heading">השיעורים שלי</h2><p class="muted" style="margin:0">בחר שיעור כדי לראות את המילים ולהתחיל סט</p></div>
    <div id="lessonList" class="lesson-list"></div>
    <button id="allLessonsButton" class="primary all-lessons-button" type="button">כל המילים והתרגול המשולב</button>
  </section>

  <section id="lessonPage" class="lesson-page" hidden>
    <h2 id="lessonTitle" class="lesson-title"></h2>
    <div id="featuredCard" class="card home-feature" tabindex="0" aria-label="מילה מהשיעור. החליקו ימינה או שמאלה למעבר בין מילים">
      <button id="featuredAudio" class="audio-button" type="button" title="השמעת המילה והמשפט" aria-label="השמעת המילה ואז המשפט"></button>
      <div class="word-content"><div class="word-line"><h2 id="featuredWord" class="word"></h2><span id="featuredTranslit" class="translit"></span></div>
      <p id="featuredMeaning" class="word-meaning"></p><div id="featuredMeta" class="meta-tags"></div>
      <div class="example"><p id="featuredSentence" class="sentence"></p></div></div>
    </div>
    <div class="dashboard-list">
      <button class="dashboard-row" type="button" data-home-list="all"><span><strong>כל המילים</strong></span><span id="allRing" class="progress-ring"><b id="homeAllCount">0</b></span></button>
      <button class="dashboard-row" type="button" data-home-list="unseen"><span><strong>עוד לא למדתי</strong></span><span id="unseenRing" class="progress-ring"><b id="homeUnseenCount">0</b></span></button>
      <button class="dashboard-row" type="button" data-home-list="retry"><span><strong>מילים לחזרה</strong></span><span id="retryRing" class="progress-ring"><b id="homeRetryCount">0</b></span></button>
    </div>
    <button id="practiceButton" class="primary home-practice" type="button">תרגול השיעור</button>
  </section>

  <section id="quizPage" hidden>
    <div id="sessionProgress" class="session-progress"><span>טוען…</span></div>
    <div class="word-card-viewport"><div id="wordCard" class="card word-card">
      <div id="successPop" class="success-pop" hidden><div class="success-check">✓</div></div>
      <button id="quizAudio" class="audio-button" type="button" title="השמעת המילה והמשפט" aria-label="השמעת המילה ואז המשפט"></button>
      <div class="word-content"><div class="word-line"><h2 id="arabicWord" class="word"></h2><span id="wordTranslit" class="translit"></span></div>
      <div id="meta" class="meta-tags"></div>
      <div class="example"><p id="arabicSentence" class="sentence"></p></div></div>
      <form id="form"><input id="word" aria-label="תרגום המילה" placeholder="תרגום המילה" autocomplete="off"><button id="checkButton" class="check" type="button">בדיקה</button><span id="keyboardSpacer" class="keyboard-spacer" aria-hidden="true"></span></form>
      <section id="feedback" class="feedback" hidden>
        <div id="wrongAnswerBox" class="answer-state wrong-answer"><span class="answer-icon">×</span><div class="answer-content"><p id="mine"></p></div></div>
        <div class="answer-state correct-answer"><span class="answer-icon">✓</span><div class="answer-content"><small>התשובה הנכונה</small><p id="correct"></p><p id="correctSentence" class="sentence-translation"></p></div></div>
        <p id="retryNotice" class="retry-notice">נוסף לרשימת המילים לחזרה</p>

function currentResult(){return sessionResults[itemKey(order[index])]}
function highlightWord(q){if(!q.s)return'';const marks='[\\u064B-\\u065F\\u0670]*',escape=c=>c.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+marks,words=q.w.trim().split(/\s+/).map(word=>word.replace(/[\u064B-\u065F\u0670]/g,'')),parts=words.map(word=>'(?:[وبفكل]?'+marks+'ا?ل'+marks+')?'+[...word].map(escape).join(''));const token=parts.join('\\s+');return q.s.replace(new RegExp(token,'u'),m=>'<span class="target">'+m+'</span>')}
function highlightHebrew(q){if(!q.t)return'';let stem=q.m.find(m=>q.t.includes(m))||q.m.map(m=>m.replace(/ים$/,'')).find(m=>q.t.includes(m))||q.m[0];const safe=stem.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return q.t.replace(new RegExp('[א-ת״׳"\']*'+safe+'[א-ת״׳"\']*','u'),m=>'<span class="target">'+m+'</span>')}

function renderSessionProgress(){const progressEl=by('sessionProgress'),segments=order.map((q,i)=>{const r=sessionResults[itemKey(q)],classes=[];if(r?.status)classes.push(r.status);if(i===furthestIndex&&!r)classes.push('frontier');if(i===index)classes.push('current');return '<span class="progress-item">'+(i===index?'<b id="counter" class="progress-counter">'+(index+1)+'/'+order.length+'</b>':'')+'<i class="progress-segment '+classes.join(' ')+'"></i></span>'}).join('');progressEl.innerHTML=segments}
function draw(){stopAudio();const q=order[index];if(!q)return;setAudioButton(q,'quiz');const result=currentResult();renderSessionProgress();by('arabicWord').textContent=q.w;by('wordTranslit').textContent='('+q.tr+')';renderMetaTags(by('meta'),q.f);by('arabicSentence').innerHTML=q.s?highlightWord(q):'למילה הזאת עדיין לא נוסף משפט לדוגמה בגיליון.';by('previousButton').disabled=index===0;by('word').value=result?.answer||'';if(result){form.hidden=true;renderFeedback(q,result)}else{const button=by('checkButton');form.hidden=false;feedback.hidden=true;button.disabled=false;button.classList.remove('is-loading');button.removeAttribute('aria-busy');button.textContent='בדיקה'}by('nextButton').textContent=result?(index===order.length-1?'סיום הסט':'מילה הבאה'):(index===order.length-1?'דילוג וסיום':'דילוג');updateCounts()}
function renderFeedback(q,result){const ok=result.status==='correct';feedback.hidden=false;const hasAnswer=!ok&&Boolean(String(result.answer||'').trim());by('wrongAnswerBox').hidden=!hasAnswer;if(hasAnswer)by('mine').textContent=result.answer;by('correct').textContent=ok?q.m.join(' / '):(result.correction||q.m.join(' / '));by('correctSentence').innerHTML=q.t?highlightHebrew(q):'למשפט הזה עדיין לא נוסף תרגום בגיליון.';by('retryNotice').hidden=ok}
function applyOutcome(q,status,answer,details={}){const id=itemKey(q),wasRetry=progress[id]?.status==='retry',updatedAt=new Date().toISOString();if(status==='correct'){if(wasRetry){const successes=Math.min(3,(progress[id].successes||0)+1);if(successes>=3)progress[id]={status:'known',successes:3,dueSet:null,updatedAt};else progress[id]={status:'retry',successes,dueSet:sessionNumber+(successes===1?3:6),updatedAt}}else progress[id]={status:'known',successes:3,dueSet:null,updatedAt}}else progress[id]={status:'retry',successes:0,dueSet:sessionNumber+2,updatedAt};sessionResults[id]={status,answer:answer||'',correction:details.correction||q.m.join(' / '),wasRetry};saveState();draw()}

function celebrateAndAdvance(){if(transitioning)return;transitioning=true;const card=by('wordCard'),pop=by('successPop');card.classList.add('transitioning');pop.hidden=false;setTimeout(()=>card.classList.add('swipe-out'),520);setTimeout(()=>{pop.hidden=true;card.classList.remove('swipe-out');if(index===order.length-1){card.classList.remove('transitioning');transitioning=false;showSummary();return}index++;furthestIndex=Math.max(furthestIndex,index);saveState();draw();card.classList.add('swipe-in');requestAnimationFrame(()=>setTimeout(()=>{card.classList.remove('swipe-in','transitioning');transitioning=false},350))},900)}

form.addEventListener('submit',async e=>{e.preventDefault();const q=order[index],answer=by('word').value.trim(),button=by('checkButton');button.disabled=true;button.classList.add('is-loading');button.setAttribute('aria-busy','true');button.innerHTML='בודק<span class="loading-dots" aria-hidden="true"><i></i><i></i><i></i></span>';if(!answer){applyOutcome(q,'wrong','',{correction:q.m.join(' / ')});return}if(matchesLocally(answer,q.m)){applyOutcome(q,'correct',answer);celebrateAndAdvance();return}try{const result=await api({action:'evaluate',word:q.w,acceptedMeanings:q.m,answer});applyOutcome(q,result.correct?'correct':'wrong',answer,result);if(result.correct)celebrateAndAdvance()}catch(error){console.error(error);applyOutcome(q,'wrong',answer,{correction:q.m.join(' / ')})}});
function animateNavigation(direction,changeWord){if(transitioning)return;transitioning=true;const card=by('wordCard'),outClass=direction==='next'?'swipe-out-next':'swipe-out-previous',inClass=direction==='next'?'swipe-in-next':'swipe-in-previous';card.classList.add('transitioning',outClass);setTimeout(()=>{card.classList.remove(outClass);const staysOnQuiz=changeWord();if(staysOnQuiz===false){card.classList.remove('transitioning');transitioning=false;return}draw();card.classList.add(inClass);setTimeout(()=>{card.classList.remove(inClass,'transitioning');transitioning=false},300)},280)}
function nextWord(){if(transitioning)return;const q=order[index];if(!currentResult())applyOutcome(q,'skipped','');animateNavigation('next',()=>{if(index===order.length-1){showSummary();return false}index++;furthestIndex=Math.max(furthestIndex,index);saveState();return true})}
function previousWord(){if(index===0||transitioning)return;animateNavigation('previous',()=>{index--;saveState();return true})}
function navigateOpened(delta){const target=index+delta;if(transitioning||target<0||target>furthestIndex||target>=order.length)return;animateNavigation(delta>0?'next':'previous',()=>{index=target;saveState();return true})}

function showSummary(){saveState();activeView='summary';by('headerHomeButton').hidden=false;hidePages();by('summaryPage').hidden=false;const results=order.map(q=>sessionResults[itemKey(q)]||{status:'skipped'}),correct=results.filter(r=>r.status==='correct').length;by('summaryStats').textContent=correct+' תשובות נכונות מתוך '+order.length;by('summaryList').innerHTML=order.map(q=>{const r=sessionResults[itemKey(q)]||{status:'skipped'},icon=r.status==='correct'?'✅':r.status==='skipped'?'⏭':'❌',p=progress[itemKey(q)],arabic=q.s?'<div class="list-sentence">'+highlightWord(q)+'</div>':'',hebrew=q.t?'<div class="summary-translation muted">'+highlightHebrew(q)+'</div>':'';return '<div class="summary-row"><div><div class="list-line"><span class="list-word">'+q.w+'</span><span class="muted">('+q.tr+') — '+q.m.join(' / ')+'</span></div><div class="muted" style="font-size:13px;margin-top:4px">'+q.f+'</div>'+arabic+hebrew+'</div><div><span class="result-icon">'+icon+'</span>'+(p?.status==='retry'?' '+dots(p.successes||0):'')+'</div></div>'}).join('')}
function showQuiz(){activeView='quiz';by('headerHomeButton').hidden=false;hidePages();by('quizPage').hidden=false}

function clearDrawerDragStyles(){const drawer=by('drawer'),overlay=by('drawerOverlay');drawer.classList.remove('dragging');drawer.style.transition='';drawer.style.transform='';overlay.style.transition='';overlay.style.opacity=''}
function openMenu(){clearTimeout(drawerCloseTimer);clearDrawerDragStyles();updateCounts();const drawer=by('drawer'),overlay=by('drawerOverlay');drawer.hidden=false;overlay.hidden=false;requestAnimationFrame(()=>{drawer.classList.add('is-open');overlay.classList.add('is-open')})}
function closeMenu(){const drawer=by('drawer'),overlay=by('drawerOverlay');if(drawer.hidden)return;clearDrawerDragStyles();drawer.classList.remove('is-open');overlay.classList.remove('is-open');clearTimeout(drawerCloseTimer);drawerCloseTimer=setTimeout(()=>{drawer.hidden=true;overlay.hidden=true;clearDrawerDragStyles()},310)}
function cancelDrawerSwipe(){const drawer=by('drawer'),overlay=by('drawerOverlay');drawer.classList.remove('dragging');drawer.style.transition='transform .22s ease-out';drawer.style.transform='translateX(0)';overlay.style.transition='opacity .22s ease-out';overlay.style.opacity='1';setTimeout(clearDrawerDragStyles,230)}
function finishDrawerSwipe(){const drawer=by('drawer'),overlay=by('drawerOverlay');drawer.classList.remove('dragging','is-open');overlay.classList.remove('is-open');drawer.style.transition='transform .24s ease-in';drawer.style.transform='translateX(105%)';overlay.style.transition='opacity .2s ease';overlay.style.opacity='0';clearTimeout(drawerCloseTimer);drawerCloseTimer=setTimeout(()=>{drawer.hidden=true;overlay.hidden=true;clearDrawerDragStyles()},250)}
function showList(type){listReturnView=activeView==='list'?listReturnView:activeView;activeView='list';activeListType=type;closeMenu();by('headerHomeButton').hidden=true;const pool=lessonItems(),list=type==='all'?pool:pool.filter(q=>stateOf(q)===type),titles={all:'כל המילים',known:'מילים שאני יודע',unseen:'עוד לא למדתי',retry:'מילים לחזרה'};by('listTitle').textContent=titles[type]+' · '+lessonTitle()+' ('+list.length+')';by('listPractice').hidden=!list.length;by('listPractice').textContent=type==='retry'?'תרגול המילים לחזרה':'תרגול הרשימה';by('wordList').innerHTML=list.length?list.map(q=>{const p=progress[itemKey(q)];return '<div class="word-row"><div><div class="list-line"><span class="list-word">'+q.w+'</span><span class="muted">('+q.tr+') — '+q.m.join(' / ')+'</span></div><div class="muted" style="font-size:13px;margin-top:5px">'+q.f+'</div>'+(q.s?'<div class="list-sentence">'+highlightWord(q)+'</div><div class="muted" style="font-size:15px;margin-top:5px">'+highlightHebrew(q)+'</div>':'')+'</div>'+(type==='retry'?dots(p?.successes||0):'')+'</div>'}).join(''):'<div class="empty">הרשימה עדיין ריקה</div>';hidePages();by('listPage').hidden=false}
async function resetAll(){if(!confirm('למחוק את כל ההתקדמות מהמכשיר ומהענן? המילים עצמן לא יימחקו.'))return;clearTimeout(cloudSaveTimer);progress={};sessionResults={};order=[];index=0;furthestIndex=0;sessionNumber=0;selectedLesson='all';sessionLesson='all';localStorage.removeItem(STORAGE_KEY);for(const key of LEGACY_KEYS)localStorage.removeItem(key);try{await api({action:'reset-progress',userId:userCode,sessionToken:googleSession});setCloudStatus('ההתקדמות אופסה')}catch(error){console.error(error);setCloudStatus('האיפוס בענן לא הושלם',true)}featuredIndex=null;showHome()}

function loadGoogleAccount(){googleSession=localStorage.getItem(GOOGLE_SESSION_KEY)||'';try{googleProfile=JSON.parse(localStorage.getItem(GOOGLE_PROFILE_KEY)||'null')}catch{googleProfile=null}}
function renderGoogleAccount(){const signedIn=Boolean(googleSession&&googleProfile);by('googleProfile').hidden=!signedIn;by('googleSignOut').hidden=!signedIn;by('googleSignIn').hidden=signedIn;if(signedIn){by('googleName').textContent=googleProfile.name||'משתמש Google';by('googleEmail').textContent=googleProfile.email||'';by('googlePicture').src=googleProfile.picture||'';by('googlePicture').hidden=!googleProfile.picture}}
async function handleGoogleCredential(response){if(!response?.credential)return;setCloudStatus('מתחבר לחשבון Google…');try{clearTimeout(cloudSaveTimer);await pushCloudState(statePayload());const result=await api({action:'google-login',credential:response.credential,anonymousUserId:userCode});googleSession=result.sessionToken;googleProfile=result.profile;localStorage.setItem(GOOGLE_SESSION_KEY,googleSession);localStorage.setItem(GOOGLE_PROFILE_KEY,JSON.stringify(googleProfile));setCloudStatus('חשבון Google חובר בהצלחה');location.reload()}catch(error){console.error(error);setCloudStatus('החיבור ל־Google נכשל. אפשר לנסות שוב.',true)}}
function initGoogleSignIn(){renderGoogleAccount();if(googleSession)return;let attempts=0;const ready=setInterval(()=>{attempts++;if(window.google?.accounts?.id){clearInterval(ready);google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:handleGoogleCredential});google.accounts.id.renderButton(by('googleSignIn'),{type:'standard',theme:'outline',size:'large',text:'signin_with',shape:'rectangular',width:280,locale:'he'})}else if(attempts>40){clearInterval(ready);setCloudStatus('לא הצלחנו לטעון את כפתור Google',true)}},150)}
async function signOutGoogle(){if(!confirm('להתנתק מחשבון Google במכשיר הזה? ההתקדמות תישאר שמורה בענן.'))return;localStorage.removeItem(GOOGLE_SESSION_KEY);localStorage.removeItem(GOOGLE_PROFILE_KEY);googleSession='';googleProfile=null;if(window.google?.accounts?.id)google.accounts.id.disableAutoSelect();location.reload()}

by('featuredAudio').addEventListener('click',e=>{e.stopPropagation();playWordAndSentence(lessonItems()[featuredIndex],e.currentTarget)});by('quizAudio').addEventListener('click',e=>{e.stopPropagation();playWordAndSentence(order[index],e.currentTarget)});
by('checkButton').addEventListener('pointerdown',e=>{e.preventDefault();if(!by('checkButton').disabled)form.requestSubmit()});by('checkButton').addEventListener('click',()=>{if(!by('checkButton').disabled)form.requestSubmit()});by('nextButton').addEventListener('click',nextWord);by('previousButton').addEventListener('click',previousWord);by('continueButton').addEventListener('click',()=>buildSession(sessionFilter));by('practiceButton').addEventListener('click',()=>{if(order.length&&sessionLesson===selectedLesson&&sessionFilter==='all'&&Object.keys(sessionResults).length<order.length){showQuiz();draw()}else buildSession('all')});by('listPractice').addEventListener('click',()=>buildSession(activeListType));by('allLessonsButton').addEventListener('click',()=>showLesson('all'));by('homeButton').addEventListener('click',showHome);by('menuButton').addEventListener('click',openMenu);by('closeMenu').addEventListener('click',closeMenu);by('drawerOverlay').addEventListener('click',closeMenu);by('resetProgress').addEventListener('click',resetAll);by('listBack').addEventListener('click',()=>animatePageBack(()=>{if(listReturnView==='home')showHome();else if(listReturnView==='lesson')showLesson();else if(listReturnView==='summary')showSummary();else{showQuiz();draw()}}));document.querySelectorAll('[data-list]').forEach(b=>b.addEventListener('click',()=>{selectedLesson='all';showList(b.dataset.list)}));document.querySelectorAll('[data-home-list]').forEach(b=>b.addEventListener('click',()=>showList(b.dataset.homeList)));by('shuffleButton').addEventListener('click',()=>{shuffleOn=!shuffleOn;by('shuffleButton').classList.toggle('active',shuffleOn);by('shuffleButton').querySelector('.menu-icon').textContent=shuffleOn?'🔀':'⇥';saveState()});by('word').addEventListener('focus',()=>{if(window.innerWidth<=560)setTimeout(()=>by('wordCard').scrollIntoView({behavior:'smooth',block:'start'}),280)});

by('drawer').addEventListener('pointerdown',e=>{if(!e.isPrimary||e.target.closest('input,a'))return;drawerPointerStart={x:e.clientX,y:e.clientY,dx:0,pointerId:e.pointerId,dragging:false,cancelled:false};try{by('drawer').setPointerCapture(e.pointerId)}catch{}});
by('drawer').addEventListener('pointermove',e=>{const drag=drawerPointerStart;if(!drag||drag.pointerId!==e.pointerId||drag.cancelled)return;const dx=e.clientX-drag.x,dy=e.clientY-drag.y;drag.dx=Math.max(0,dx);if(!drag.dragging){if(Math.abs(dx)<7&&Math.abs(dy)<7)return;if(Math.abs(dy)>Math.abs(dx)||dx<0){drag.cancelled=true;return}drag.dragging=true;by('drawer').classList.add('dragging')}if(drag.dragging){e.preventDefault();e.stopPropagation();const drawer=by('drawer'),ratio=Math.min(1,drag.dx/drawer.offsetWidth);drawer.style.transform=`translateX(${drag.dx}px)`;by('drawerOverlay').style.opacity=String(1-ratio*.8)}});
by('drawer').addEventListener('pointerup',e=>{const drag=drawerPointerStart;if(!drag||drag.pointerId!==e.pointerId)return;drawerPointerStart=null;try{by('drawer').releasePointerCapture(e.pointerId)}catch{}if(!drag.dragging){clearDrawerDragStyles();return}by('drawer').dataset.suppressClick='1';setTimeout(()=>{delete by('drawer').dataset.suppressClick},350);e.preventDefault();e.stopPropagation();if(drag.dx>Math.min(100,by('drawer').offsetWidth*.24))finishDrawerSwipe();else cancelDrawerSwipe()});
by('drawer').addEventListener('pointercancel',()=>{const wasDragging=drawerPointerStart?.dragging;drawerPointerStart=null;if(wasDragging)cancelDrawerSwipe();else clearDrawerDragStyles()});
by('drawer').addEventListener('click',e=>{if(by('drawer').dataset.suppressClick==='1'){e.preventDefault();e.stopImmediatePropagation();delete by('drawer').dataset.suppressClick}},true);

by('featuredCard').addEventListener('pointerdown',e=>{if(!e.isPrimary||featuredTransitioning||e.target.closest('button'))return;featurePointerStart={x:e.clientX,y:e.clientY,dx:0,pointerId:e.pointerId,dragging:false,cancelled:false};try{by('featuredCard').setPointerCapture(e.pointerId)}catch{}});
by('featuredCard').addEventListener('pointermove',e=>{const drag=featurePointerStart;if(!drag||drag.pointerId!==e.pointerId||drag.cancelled)return;const dx=e.clientX-drag.x,dy=e.clientY-drag.y;drag.dx=dx;if(!drag.dragging){if(Math.abs(dx)<7&&Math.abs(dy)<7)return;if(Math.abs(dy)>Math.abs(dx)){drag.cancelled=true;return}drag.dragging=true;by('featuredCard').classList.add('dragging')}if(drag.dragging){e.preventDefault();e.stopPropagation();const card=by('featuredCard'),rotation=Math.max(-5,Math.min(5,dx/28));card.style.transform=`translateX(${dx}px) rotate(${rotation}deg)`;card.style.opacity=String(Math.max(.55,1-Math.abs(dx)/(card.offsetWidth*1.8)))}});
by('featuredCard').addEventListener('pointerup',e=>{const drag=featurePointerStart;if(!drag||drag.pointerId!==e.pointerId)return;featurePointerStart=null;try{by('featuredCard').releasePointerCapture(e.pointerId)}catch{}if(!drag.dragging){resetFeaturedCard(by('featuredCard'));return}e.preventDefault();e.stopPropagation();const threshold=Math.min(105,by('featuredCard').offsetWidth*.22);if(Math.abs(drag.dx)>=threshold)finishFeaturedDrag(drag.dx);else cancelFeaturedDrag()});
by('featuredCard').addEventListener('pointercancel',()=>{const wasDragging=featurePointerStart?.dragging;featurePointerStart=null;if(wasDragging)cancelFeaturedDrag();else resetFeaturedCard(by('featuredCard'))});
by('featuredCard').addEventListener('keydown',e=>{if(e.key==='ArrowLeft'){e.preventDefault();changeFeatured(1)}else if(e.key==='ArrowRight'){e.preventDefault();changeFeatured(-1)}});
by('wordCard').addEventListener('pointerdown',e=>{if(!e.isPrimary||e.target.closest('input,button,form'))return;wordPointerStart={x:e.clientX,y:e.clientY}});
by('wordCard').addEventListener('pointerup',e=>{if(!wordPointerStart)return;const dx=e.clientX-wordPointerStart.x,dy=e.clientY-wordPointerStart.y;wordPointerStart=null;if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.25)navigateOpened(dx<0?1:-1)});
by('wordCard').addEventListener('pointercancel',()=>{wordPointerStart=null});
by('word').addEventListener('focus',()=>{if(window.innerWidth<=560)setTimeout(()=>by('keyboardSpacer').scrollIntoView({behavior:'smooth',block:'end'}),420)});
by('headerHomeButton').addEventListener('click',()=>animatePageBack(showHome));
by('copyUserCode').addEventListener('click',async()=>{try{await navigator.clipboard.writeText(userCode);setCloudStatus('קוד השחזור הועתק')}catch{prompt('העתק את קוד השחזור:',userCode)}});
by('restoreUserCode').addEventListener('click',()=>{const code=(prompt('הדבק את קוד השחזור שלך:')||'').trim().toLowerCase();if(!code)return;if(!/^[a-f0-9]{32}$/.test(code)){alert('קוד השחזור אינו תקין');return}if(code===userCode)return;if(!confirm('לטעון את ההתקדמות המשויכת לקוד הזה?'))return;localStorage.setItem(USER_CODE_KEY,code);localStorage.removeItem(STORAGE_KEY);location.reload()});
by('googleSignOut').addEventListener('click',signOutGoogle);

(async()=>{try{userCode=getUserCode();loadGoogleAccount();by('userCode').textContent=userCode;initGoogleSignIn();await loadVocabulary();await loadState();by('shuffleButton').classList.toggle('active',shuffleOn);by('shuffleButton').querySelector('.menu-icon').textContent=shuffleOn?'🔀':'⇥';showHome()}catch(error){console.error(error);by('featuredSentence').textContent='לא הצלחנו לטעון את אוצר המילים: '+error.message}})();
</script>
